<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1b4a1e;
      --green-mid:   #255c29;
      --green-light: #2e7534;
      --gold:        #c8a020;
      --gold-glow:   rgba(200,160,32,0.28);
      --gold-dim:    rgba(200,160,32,0.12);
      --border:      rgba(255,255,255,0.1);
      --bot-msg:     rgba(255,255,255,0.05);
      --radius:      12px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--green-dark);
      color: white;
    }

    /* HEADER */
    .chat-header {
      background: var(--green-mid);
      color: white;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(200,160,32,0.25);
    }

    .header-icon {
      width: 36px; height: 36px;
      background: var(--gold);
      color: var(--green-dark);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h2 { font-size: 0.92rem; font-weight: 700; }
    .header-info p  { font-size: 0.72rem; opacity: 0.65; }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2s infinite;
      margin-left: auto;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* MESSAGES */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--green-dark);
    }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .message { display: flex; align-items: flex-end; gap: 8px; animation: fadeIn 0.22s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .message.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .message.bot  .message-avatar { background: var(--gold); color: var(--green-dark); }
    .message.user .message-avatar { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

    .message-bubble {
      max-width: 78%;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .message.bot  .message-bubble { background: var(--bot-msg); border: 1px solid var(--border); border-bottom-left-radius: 3px; color: rgba(255,255,255,0.88); }
    .message.user .message-bubble { background: var(--gold); color: var(--green-dark); font-weight: 500; border-bottom-right-radius: 3px; }

    /* TYPING */
    .typing-indicator {
      padding: 9px 12px;
      background: var(--bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      display: flex; align-items: center; gap: 4px;
      max-width: fit-content;
    }
    .typing-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

    /* INPUT */
    .input-area {
      padding: 10px 12px;
      border-top: 1px solid rgba(200,160,32,0.2);
      background: var(--green-mid);
      flex-shrink: 0;
    }

    .quick-actions { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .quick-chip {
      padding: 4px 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,160,32,0.3);
      border-radius: 999px;
      font-size: 0.74rem;
      cursor: pointer;
      transition: all 0.18s;
      color: rgba(255,255,255,0.75);
      font-family: inherit;
    }
    .quick-chip:hover { background: var(--gold); color: var(--green-dark); border-color: var(--gold); font-weight: 600; }

    .input-wrapper { display: flex; gap: 8px; align-items: center; }

    .input-field {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.13);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: inherit;
      font-size: 0.875rem;
      resize: none;
      min-height: 38px;
      max-height: 100px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.4;
      color: white;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.28); }
    .input-field:focus { border-color: var(--gold); }

    .send-btn {
      background: var(--gold);
      color: var(--green-dark);
      border: none;
      border-radius: 10px;
      width: 38px; height: 38px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
      transition: all 0.18s;
      flex-shrink: 0;
      box-shadow: 0 3px 10px var(--gold-glow);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 16px var(--gold-glow); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* WELCOME */
    .welcome-box {
      background: var(--gold-dim);
      border: 1px solid rgba(200,160,32,0.25);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 0.85rem;
    }
    .welcome-box h3 { color: var(--gold); margin-bottom: 8px; font-size: 0.88rem; font-weight: 700; }
    .welcome-box ul { list-style: none; }
    .welcome-box li { padding: 3px 0; color: rgba(255,255,255,0.72); }
    .welcome-box li:before { content: "— "; color: var(--gold); }
  </style>
</head>
<body>

  <div class="chat-header">
    <div class="header-icon">🏛</div>
    <div class="header-info">
      <h2>Ana – Asistentka Občine</h2>
      <p>Sveta Ana v Slovenskih goricah</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages-container" id="msgs"></div>

  <div class="input-area">
    <div class="quick-actions" id="quickActions">
      <button class="quick-chip" data-p="Kakšne so uradne ure občine?">Uradne ure</button>
      <button class="quick-chip" data-p="Kdo so uslužbenci občine?">Kontakti</button>
      <button class="quick-chip" data-p="Katere vloge in obrazce ponuja občina?">Vloge</button>
      <button class="quick-chip" data-p="Kaj je trenutno aktualno v občini?">Aktualno</button>
      <button class="quick-chip" data-p="Kdo je župan občine Sveta Ana?">Župan</button>
    </div>
    <div class="input-wrapper">
      <textarea class="input-field" id="inp" rows="1" placeholder="Vprašajte Ano..."></textarea>
      <button class="send-btn" id="sendBtn">→</button>
    </div>
  </div>

  <script>
    const API_STREAM = (window.CHATBOT_API_URL || '') + '/chat/stream';
    const sessionId = localStorage.getItem('svana_session') || crypto.randomUUID();
    localStorage.setItem('svana_session', sessionId);

    const msgs    = document.getElementById('msgs');
    const inp     = document.getElementById('inp');
    const sendBtn = document.getElementById('sendBtn');

    function fmt(t) {
      return t
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\n/g,'<br>')
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    }

    function addMsg(text, type) {
      const wrap = document.createElement('div');
      wrap.className = `message ${type}`;
      const av = document.createElement('div');
      av.className = 'message-avatar';
      av.textContent = type === 'bot' ? 'A' : 'Vi';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = fmt(text);
      wrap.appendChild(av);
      wrap.appendChild(bubble);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'message bot'; wrap.id = 'typing';
      const av = document.createElement('div');
      av.className = 'message-avatar'; av.textContent = 'A';
      const ind = document.createElement('div');
      ind.className = 'typing-indicator';
      ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      wrap.appendChild(av); wrap.appendChild(ind);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideTyping() { document.getElementById('typing')?.remove(); }

    async function send(text) {
      const t = text.trim();
      if (!t) return;
      document.getElementById('quickActions').style.display = 'none';
      addMsg(t, 'user');
      inp.value = '';
      inp.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();
      try {
        const r = await fetch(API_STREAM, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: t, session_id: sessionId})
        });
        hideTyping();
        if (!r.ok) { addMsg('Napaka pri povezavi. Pokličite nas: 02/729 58 80', 'bot'); return; }

        const wrap = document.createElement('div');
        wrap.className = 'message bot';
        const av = document.createElement('div');
        av.className = 'message-avatar'; av.textContent = 'A';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        wrap.appendChild(av); wrap.appendChild(bubble);
        msgs.appendChild(wrap);

        const reader  = r.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          bubble.innerHTML = fmt(full);
          msgs.scrollTop = msgs.scrollHeight;
        }
        if (!full.trim()) bubble.textContent = 'Ni odgovora.';
      } catch {
        hideTyping();
        addMsg('Napaka pri povezavi. Pokličite nas: 02/729 58 80', 'bot');
      } finally {
        sendBtn.disabled = false;
        inp.focus();
      }
    }

    sendBtn.addEventListener('click', () => send(inp.value));
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(inp.value); }
    });
    inp.addEventListener('input', () => {
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
    });
    document.querySelectorAll('.quick-chip').forEach(c =>
      c.addEventListener('click', () => send(c.dataset.p))
    );

    // Welcome sporočilo
    msgs.innerHTML = `<div class="welcome-box">
      <h3>Pozdravljeni pri Občini Sveta Ana</h3>
      <ul>
        <li>Uradne ure in kontakti</li>
        <li>Vloge, obrazci in postopki</li>
        <li>Aktualne novice in razpisi</li>
        <li>Pošljite pritožbo ali pohvalo</li>
      </ul>
    </div>`;
  </script>
</body>
</html>
